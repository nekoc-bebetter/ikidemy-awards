<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ikidemy Awards Night — Lucky Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#c9a84c;--gold-light:#e8d5a3;--gold-dim:#7a6a4a;
  --bg:#07060a;--bg2:#0d0b10;--bg3:#0a0910;
  --border:#2a2230;--border2:#1e1c28;
  --pd:#16101e;--pm:#3a2e4a;
}
html,body{width:100%;min-height:100%;background:var(--bg);}
body{font-family:'Cormorant Garamond',Georgia,serif;color:var(--gold-light);overflow-x:hidden;}
#admWrap{background:var(--bg2);border-bottom:1px solid var(--border);position:relative;z-index:20;}
.adm-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:.8rem 1.4rem;}
.adm-lbl{font-size:11px;color:var(--gold-dim);letter-spacing:3px;font-family:'Playfair Display',serif;}
.ubtn{padding:5px 13px;border:1px solid var(--pm);background:var(--pd);color:var(--gold);font-size:11px;cursor:pointer;border-radius:3px;font-family:'Cormorant Garamond',serif;letter-spacing:1px;transition:background .2s;}
.ubtn:hover{background:#211530;}
.chips{display:flex;gap:5px;}
.chip{font-size:10px;color:var(--gold-dim);background:var(--pd);border:1px solid var(--border);padding:2px 9px;border-radius:20px;}
.chip b{color:var(--gold);}
.tbtn{margin-left:auto;padding:6px 16px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:10px;cursor:pointer;letter-spacing:3px;border-radius:3px;font-family:'Playfair Display',serif;transition:all .2s;}
.tbtn:hover{background:var(--pd);}
.sdot{width:7px;height:7px;border-radius:50%;background:#444;display:inline-block;margin-right:5px;transition:background .4s;}
.sdot.ok{background:#4caf82;} .sdot.err{background:#c04c4c;}
.stxt{font-size:10px;color:#5a4a6a;}
.strip{display:flex;gap:5px;flex-wrap:wrap;padding:.5rem 1.4rem .8rem;max-height:94px;overflow-y:auto;}
.thumb{width:40px;height:40px;border-radius:50%;overflow:hidden;border:1.5px solid var(--pm);position:relative;flex-shrink:0;}
.thumb.drawn{opacity:.15;filter:grayscale(1);}
.thumb img,.tav{width:100%;height:100%;object-fit:cover;}
.tav{display:flex;align-items:center;justify-content:center;font-size:14px;}
.tdel{position:absolute;top:-2px;right:-2px;width:13px;height:13px;border-radius:50%;background:#120810;color:#b05060;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid #3a1a2a;}
#prizeAdm{background:var(--bg3);border-bottom:1px solid var(--border2);padding:.8rem 1.4rem;position:relative;z-index:20;}
.pa-t{font-size:10px;letter-spacing:3px;color:var(--gold-dim);margin-bottom:8px;font-family:'Playfair Display',serif;}
.prize-list{display:flex;flex-direction:column;gap:5px;}
.prize-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:3px 0;}
.prize-row.ar{border-left:2px solid var(--gold);padding-left:6px;}
.par{font-size:12px;color:var(--gold-dim);cursor:pointer;width:16px;}
.par:hover{color:var(--gold);}
.prize-row.ar .par{color:var(--gold);}
.pi{background:var(--pd);border:1px solid var(--border);color:var(--gold-light);font-size:11px;padding:4px 8px;border-radius:3px;font-family:'Cormorant Garamond',serif;}
.pi:focus{outline:none;border-color:#5a4a6a;}
.pi-n{width:130px;} .pi-a{width:100px;} .pi-q{width:48px;text-align:center;}
.pw{font-size:10px;color:#4a3a5a;}
.pd2{font-size:11px;color:#4a2a3a;cursor:pointer;}
.pd2:hover{color:#c05060;}
.adm-btns{margin-top:8px;display:flex;gap:8px;}
#stageBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#starCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.cl{position:absolute;top:0;height:100%;width:80px;}
.cl.l{left:0;background:linear-gradient(to right,rgba(40,5,20,.8),transparent);}
.cl.r{right:0;background:linear-gradient(to left,rgba(40,5,20,.8),transparent);}
.fl{position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(to right,transparent,rgba(201,168,76,.2),transparent);}
.spot{position:absolute;top:-40px;width:200px;height:600px;transform-origin:top center;opacity:0;transition:opacity 1.5s ease;pointer-events:none;}
.spot.sl{left:8%;transform:rotate(-20deg);}
.spot.sr{right:8%;transform:rotate(20deg);}
.spot.on{opacity:1;}
.sb{width:100%;height:100%;background:linear-gradient(to bottom,rgba(255,235,130,.1) 0%,rgba(255,220,100,.04) 55%,transparent 100%);}
.ss{width:12px;height:12px;border-radius:50%;background:rgba(255,240,160,.6);position:absolute;top:0;left:50%;transform:translateX(-50%);}
#stage{position:relative;z-index:5;padding:2rem 1rem 1.5rem;display:flex;flex-direction:column;align-items:center;min-height:520px;}
.fs{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem;opacity:.3;width:100%;max-width:520px;}
.fhs{display:flex;gap:4px;}
.fh{width:9px;height:9px;background:var(--bg);border:1px solid #3a2e4a;border-radius:2px;}
.fln{flex:1;height:1px;background:#2a2030;}
.pre-t{font-size:10px;letter-spacing:8px;color:#5a4a3a;margin-bottom:5px;text-align:center;font-family:'Playfair Display',serif;}
.main-t{font-family:'Playfair Display',serif;font-size:26px;letter-spacing:5px;color:var(--gold);text-align:center;font-weight:400;margin-bottom:4px;opacity:0;transform:translateY(8px);transition:opacity .8s,transform .8s;}
.main-t.show{opacity:1;transform:translateY(0);}
.sub-t{font-size:11px;letter-spacing:8px;color:#4a3a2a;text-align:center;margin-bottom:2rem;font-family:'Playfair Display',serif;}
#cbox{min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;position:relative;}
.idle-txt{color:#2a2035;font-size:13px;letter-spacing:5px;font-family:'Playfair Display',serif;}
.ring1{border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative;}
.rp{border-radius:50%;overflow:hidden;}
.rp img,.rp .av{width:100%;height:100%;object-fit:cover;display:block;}
.av{display:flex;align-items:center;justify-content:center;}
.sn{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:5px;color:var(--gold-light);margin-top:1rem;text-align:center;}
.ss2{font-size:10px;letter-spacing:6px;color:var(--gold);margin-top:6px;text-align:center;font-family:'Playfair Display',serif;}
.wn{font-family:'Playfair Display',serif;font-size:28px;letter-spacing:7px;color:#f0e8c8;text-align:center;margin-top:.8rem;}
.wp{font-size:10px;letter-spacing:8px;color:var(--gold);text-align:center;margin-top:6px;font-family:'Playfair Display',serif;}
.wa{font-family:'Playfair Display',serif;font-size:28px;letter-spacing:3px;color:var(--gold);text-align:center;margin-top:6px;}
.ca{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10;}
.cp{position:absolute;opacity:0;}
.draw-area{width:100%;max-width:380px;margin-top:1.3rem;text-align:center;}
.dbtn{width:100%;padding:14px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;letter-spacing:8px;cursor:pointer;font-family:'Playfair Display',serif;transition:all .25s;}
.dbtn:hover{background:rgba(201,168,76,.08);}
.dbtn:disabled{opacity:.25;cursor:not-allowed;}
.qnote{font-size:10px;color:#4a3a2a;letter-spacing:2px;margin-top:6px;}
#hpanel{position:relative;z-index:5;border-top:1px solid #16121e;padding:.8rem 1.4rem 1.5rem;}
.hhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hlbl{font-size:10px;letter-spacing:5px;color:#3a2a3a;font-family:'Playfair Display',serif;}
.rbtn{font-size:10px;color:#4a3a4a;background:none;border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;letter-spacing:1px;}
.rbtn:hover{color:var(--gold);}
.hlist{display:flex;gap:6px;flex-wrap:wrap;}
.hi{display:flex;align-items:center;gap:5px;background:#12101a;border:1px solid #22202a;border-radius:3px;padding:4px 9px;}
.hth{width:22px;height:22px;border-radius:50%;overflow:hidden;border:1px solid #2a2230;flex-shrink:0;}
.hth img,.htav{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:9px;}
.hn{font-size:11px;color:#a09070;} .hp{font-size:10px;color:#7a6a4a;margin-left:3px;}
</style>
</head>
<body>
<div id="admWrap">
  <div class="adm-bar">
    <span class="adm-lbl">&#9670; BACKSTAGE</span>
    <button class="ubtn" onclick="document.getElementById('fi').click()">上傳員工照片</button>
    <input type="file" id="fi" accept="image/*" multiple style="display:none">
    <div class="chips">
      <div class="chip">總人數 <b id="sT">0</b></div>
      <div class="chip">可抽 <b id="sA">0</b></div>
      <div class="chip">已抽 <b id="sD">0</b></div>
    </div>
    <span style="display:flex;align-items:center;"><span class="sdot" id="sdot"></span><span class="stxt" id="stxt">連線中...</span></span>
    <button class="tbtn" id="tbtn" onclick="toggleMode()">&#9654; 展示模式</button>
  </div>
  <div class="strip" id="strip"></div>
</div>
<div id="prizeAdm">
  <div class="pa-t">&#9670; 獎項設定（員工看不到）</div>
  <div class="prize-list" id="prizeList"></div>
  <div class="adm-btns">
    <button class="ubtn" onclick="addPrize()">+ 新增獎項</button>
    <button class="ubtn" style="border-color:var(--gold);" onclick="applyPrize()">套用選取獎項 &#9654;</button>
  </div>
</div>
<div id="stageBg">
  <canvas id="starCanvas"></canvas>
  <div class="spot sl" id="spotL"><div class="ss"></div><div class="sb"></div></div>
  <div class="spot sr" id="spotR"><div class="ss"></div><div class="sb"></div></div>
  <div class="cl l"></div><div class="cl r"></div>
  <div class="fl"></div>
</div>
<div id="stage">
  <div class="fs">
    <div class="fhs"><div class="fh"></div><div class="fh"></div><div class="fh"></div></div>
    <div class="fln"></div>
    <div class="fhs"><div class="fh"></div><div class="fh"></div><div class="fh"></div></div>
  </div>
  <div class="pre-t">THE IKIDEMY PRESENTS</div>
  <div class="main-t" id="mainTitle">THE IKIDEMY AWARDS NIGHT</div>
  <div class="sub-t">LUCKY DRAW</div>
  <div id="cbox">
    <span class="idle-txt">&#9733; &nbsp; READY &nbsp; &#9733;</span>
    <div class="ca" id="ca"></div>
  </div>
  <div class="draw-area">
    <button class="dbtn" id="dbtn" onclick="draw()">DRAW</button>
    <div class="qnote" id="qnote"></div>
  </div>
</div>
<div id="hpanel" style="display:none">
  <div class="hhd">
    <span class="hlbl">WINNERS TONIGHT</span>
    <button class="rbtn" onclick="resetAll()">RESET ALL</button>
  </div>
  <div class="hlist" id="hlist"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,set}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={
  apiKey:"AIzaSyCZBnFoK6a5w6uDCy6gr_9gLHka6Qc0n1M",
  authDomain:"ikidemy-awards.firebaseapp.com",
  databaseURL:"https://ikidemy-awards-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"ikidemy-awards",
  storageBucket:"ikidemy-awards.firebasestorage.app",
  messagingSenderId:"512160039017",
  appId:"1:512160039017:web:509bef3431346653cde2f8"
};
const fbApp=initializeApp(cfg);
const db=getDatabase(fbApp);

const BGS=["#1a1028","#0d1a28","#1a100d","#0d1a14","#1a1810","#1a0d1a"];
const CLS=["#b090e0","#60a8d8","#d09060","#60c890","#d0c060","#d060a0"];

let S={
  prizes:[
    {name:"Grand Prize",amt:"NT$30,000",quota:1},
    {name:"First Prize",amt:"NT$20,000",quota:2},
    {name:"Second Prize",amt:"NT$10,000",quota:10},
    {name:"Third Prize",amt:"NT$8,000",quota:10},
    {name:"Fourth Prize",amt:"NT$5,000",quota:10},
    {name:"Fifth Prize",amt:"NT$3,000",quota:21},
  ],
  photos:[],drawn:[],hist:[],ap:0,
  spinning:false,winner:null,cpname:"",cpamt:""
};
let localSpinning=false;
let adminMode=true;
let ignoreNext=false;

function syncOk(ok){
  document.getElementById('sdot').className='sdot'+(ok?' ok':' err');
  document.getElementById('stxt').textContent=ok?'已連線':'連線失敗';
}
function save(){
  ignoreNext=true;
  set(ref(db,'lottery'),JSON.parse(JSON.stringify(S)))
    .then(()=>syncOk(true)).catch(()=>syncOk(false));
}

onValue(ref(db,'lottery'),snap=>{
  syncOk(true);
  if(ignoreNext){ignoreNext=false;return;}
  const d=snap.val();
  if(!d)return;
  S=Object.assign(S,d);
  renderAll();
  if(S.spinning&&!localSpinning)showSpinAnim();
  else if(!S.spinning&&S.winner)showWinner(S.winner,S.cpname,S.cpamt);
},()=>syncOk(false));

function avail(){return S.photos.filter(p=>!S.drawn.includes(p.id));}
function won(i){return S.hist.filter(h=>h.pi===i).length;}
function av(p,s){
  const f=Math.floor((s||40)*.35);
  return p&&p.src
    ?`<img src="${p.src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
    :`<div class="av" style="width:100%;height:100%;background:${p?p.bg:'#1a1028'};color:${p?p.col:'#b090e0'};font-size:${f}px;font-family:'Playfair Display',serif;">${p?p.name[0]:'?'}</div>`;
}

function renderAll(){
  renderPrizeList();renderStrip();updateStats();updateNote();renderHist();
}

function renderPrizeList(){
  document.getElementById('prizeList').innerHTML=S.prizes.map((p,i)=>`
    <div class="prize-row${i===S.ap?' ar':''}">
      <span class="par" onclick="selAP(${i})">&#9654;</span>
      <input class="pi pi-n" value="${p.name}" oninput="S.prizes[${i}].name=this.value" placeholder="獎項名稱">
      <input class="pi pi-a" value="${p.amt}" oninput="S.prizes[${i}].amt=this.value" placeholder="金額">
      <span style="font-size:10px;color:#5a4a6a;">人數</span>
      <input class="pi pi-q" type="number" min="1" value="${p.quota}" oninput="S.prizes[${i}].quota=parseInt(this.value)||1">
      <span class="pw">${won(i)}已抽</span>
      ${S.prizes.length>1?`<span class="pd2" onclick="remPrize(${i})">&#10005;</span>`:''}
    </div>`).join('');
}
window.selAP=i=>{S.ap=i;renderPrizeList();updateNote();};
window.applyPrize=()=>{
  renderPrizeList();updateNote();save();
  document.getElementById('cbox').innerHTML=`<span class="idle-txt">&#9733; &nbsp; ${S.prizes[S.ap].name.toUpperCase()} &nbsp; &#9733;</span><div class="ca" id="ca"></div>`;
};
window.addPrize=()=>{S.prizes.push({name:"New Prize",amt:"NT$0",quota:1});renderPrizeList();};
window.remPrize=i=>{
  if(S.prizes.length<=1)return;
  S.prizes.splice(i,1);
  if(S.ap>=S.prizes.length)S.ap=S.prizes.length-1;
  renderPrizeList();updateNote();
};

function updateNote(){
  const p=S.prizes[S.ap]||S.prizes[0];
  const rem=Math.max(0,p.quota-won(S.ap));
  document.getElementById('qnote').textContent=`${p.name}  ／  剩餘名額 ${rem} / ${p.quota}`;
  const btn=document.getElementById('dbtn');
  btn.disabled=rem<=0||localSpinning;
  btn.textContent=rem<=0?'COMPLETED':'DRAW';
}

function renderStrip(){
  document.getElementById('strip').innerHTML=S.photos.map(p=>`
    <div class="thumb${S.drawn.includes(p.id)?' drawn':''}">${av(p,40)}
    ${!S.drawn.includes(p.id)?`<div class="tdel" onclick="delP(${p.id})">x</div>`:''}</div>`).join('');
}
window.delP=id=>{S.photos=S.photos.filter(p=>p.id!==id);renderStrip();updateStats();save();};

function updateStats(){
  const a=avail().length;
  document.getElementById('sT').textContent=S.photos.length;
  document.getElementById('sA').textContent=a;
  document.getElementById('sD').textContent=S.drawn.length;
}

window.toggleMode=()=>{
  adminMode=!adminMode;
  document.getElementById('admWrap').style.display=adminMode?'block':'none';
  document.getElementById('prizeAdm').style.display=adminMode?'block':'none';
  document.getElementById('tbtn').textContent=adminMode?'&#9654; 展示模式':'&#9632; 管理模式';
  document.getElementById('spotL').classList.toggle('on',!adminMode);
  document.getElementById('spotR').classList.toggle('on',!adminMode);
};

let spinIv=null;
function showSpinAnim(){
  const av2=avail();if(!av2.length)return;
  const box=document.getElementById('cbox');
  box.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div style="position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;width:190px;height:190px;border-radius:50%;box-shadow:0 0 50px 12px rgba(201,168,76,.22);"></div>
        <div class="ring1" style="width:160px;height:160px;">
          <div class="rp" id="sp0" style="width:148px;height:148px;">${av(av2[0],148)}</div>
        </div>
      </div>
      <div class="sn" id="sn0">&#8212;</div>
      <div class="ss2">${S.cpname}&nbsp;&#183;&nbsp;${S.cpamt}</div>
    </div>
    <div class="ca" id="ca"></div>`;
  if(spinIv)clearInterval(spinIv);
  spinIv=setInterval(()=>{
    const r=av2[Math.floor(Math.random()*av2.length)];
    const sp=document.getElementById('sp0'),sn=document.getElementById('sn0');
    if(sp)sp.innerHTML=av(r,148);
    if(sn)sn.textContent=r.name;
  },80);
}

window.draw=()=>{
  const av2=avail();if(!av2.length||localSpinning)return;
  const p=S.prizes[S.ap];if(!p)return;
  const rem=p.quota-won(S.ap);if(rem<=0)return;
  localSpinning=true;
  S.spinning=true;S.cpname=p.name;S.cpamt=p.amt;S.winner=null;
  save();
  document.getElementById('dbtn').disabled=true;
  document.getElementById('dbtn').textContent='DRAWING...';
  document.getElementById('spotL').classList.add('on');
  document.getElementById('spotR').classList.add('on');
  showSpinAnim();
  setTimeout(()=>{
    if(spinIv){clearInterval(spinIv);spinIv=null;}
    const winner=av2[Math.floor(Math.random()*av2.length)];
    S.drawn.push(winner.id);
    S.hist.push({...winner,pi:S.ap,pname:p.name,pamount:p.amt});
    S.winner=winner;S.spinning=false;localSpinning=false;
    save();
    showWinner(winner,p.name,p.amt);
    confetti();renderAll();
    const rem2=p.quota-won(S.ap);
    document.getElementById('dbtn').disabled=rem2<=0;
    document.getElementById('dbtn').textContent=rem2>0?'DRAW AGAIN':'COMPLETED';
  },2800);
};

function showWinner(w,pname,pamt){
  document.getElementById('cbox').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;width:220px;height:220px;border-radius:50%;box-shadow:0 0 70px 20px rgba(201,168,76,.28);"></div>
        <div class="ring1" style="width:180px;height:180px;">
          <div style="position:absolute;width:196px;height:196px;border-radius:50%;border:1px solid #6a5a3a;top:-8px;left:-8px;"></div>
          <div style="position:absolute;width:212px;height:212px;border-radius:50%;border:1px solid #2a2018;top:-16px;left:-16px;"></div>
          <div class="rp" style="width:168px;height:168px;">${av(w,168)}</div>
        </div>
      </div>
      <div class="wn">${w.name}</div>
      <div class="wp">${pname}</div>
      <div class="wa">${pamt}</div>
    </div>
    <div class="ca" id="ca"></div>`;
}

function confetti(){
  const box=document.getElementById('ca');if(!box)return;
  const cols=['#c9a84c','#f0e0a0','#e8c870','#fff8d0','#d4a830','#b8921e'];
  for(let i=0;i<65;i++){
    const el=document.createElement('div');el.className='cp';
    const c=cols[Math.floor(Math.random()*cols.length)];
    const x=Math.random()*100,rot=Math.random()*360,w=3+Math.random()*9,h=3+Math.random()*9;
    el.style.cssText=`left:${x}%;top:30%;width:${w}px;height:${h}px;background:${c};transform:rotate(${rot}deg);border-radius:${Math.random()>.55?'50%':'2px'};position:absolute;opacity:0;`;
    box.appendChild(el);
    el.animate([
      {opacity:1,transform:`translate(0,0) rotate(${rot}deg)`},
      {opacity:0,transform:`translate(${(Math.random()-.5)*300}px,${-(140+Math.random()*260)}px) rotate(${rot+720}deg)`}
    ],{duration:1300+Math.random()*1000,easing:'cubic-bezier(.1,.9,.3,1)',fill:'forwards'});
  }
}

function renderHist(){
  if(!S.hist.length){document.getElementById('hpanel').style.display='none';return;}
  document.getElementById('hpanel').style.display='block';
  document.getElementById('hlist').innerHTML=[...S.hist].reverse().map(h=>`
    <div class="hi">
      <div class="hth">${h.src?`<img src="${h.src}">`:`<div class="htav" style="background:${h.bg};color:${h.col};">${h.name[0]}</div>`}</div>
      <span class="hn">${h.name}</span><span class="hp">${h.pname}</span>
    </div>`).join('');
}

window.resetAll=()=>{
  if(!confirm('確定重置所有抽獎紀錄？'))return;
  S.drawn=[];S.hist=[];S.winner=null;S.spinning=false;
  localSpinning=false;save();renderAll();
  document.getElementById('cbox').innerHTML='<span class="idle-txt">&#9733; &nbsp; READY &nbsp; &#9733;</span><div class="ca" id="ca"></div>';
  document.getElementById('dbtn').textContent='DRAW';
  document.getElementById('dbtn').disabled=false;
};

document.getElementById('fi').addEventListener('change',function(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      S.photos.push({id:Date.now()+Math.random(),name:f.name.replace(/\.[^.]+$/,''),src:ev.target.result,bg:BGS[S.photos.length%6],col:CLS[S.photos.length%6]});
      renderStrip();updateStats();save();
    };r.readAsDataURL(f);
  });this.value='';
});

function initStars(){
  const c=document.getElementById('starCanvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  for(let i=0;i<120;i++){
    const x=Math.random()*c.width,y=Math.random()*c.height,rr=Math.random()*.9+.1,a=Math.random()*.6+.1;
    ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,240,180,${a})`;ctx.fill();
  }
}
window.addEventListener('resize',initStars);
initStars();
renderAll();
setTimeout(()=>document.getElementById('mainTitle').classList.add('show'),500);
</script>
</body>
</html>
