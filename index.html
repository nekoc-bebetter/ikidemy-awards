<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ikidemy Awards Night — Lucky Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#c9a84c;--gold-light:#e8d5a3;--gold-dim:#7a6a4a;
  --bg:#07060a;--bg2:#0d0b10;--bg3:#0a0910;
  --border:#2a2230;--pd:#16101e;--pm:#3a2e4a;
}
html,body{width:100%;min-height:100%;background:var(--bg);}
body{font-family:'Cormorant Garamond',Georgia,serif;color:var(--gold-light);overflow-x:hidden;}

/* MODE SELECT */
#modeSelect{position:fixed;top:0;left:0;width:100%;height:100%;background:#07060a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;}
.ms-title{font-family:'Playfair Display',serif;font-size:24px;letter-spacing:7px;color:var(--gold);text-align:center;}
.ms-sub{font-size:12px;letter-spacing:4px;color:var(--gold-dim);text-align:center;}
.ms-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.ms-btn{padding:18px 36px;border:1px solid;background:transparent;font-size:13px;letter-spacing:4px;cursor:pointer;font-family:'Playfair Display',serif;transition:all .25s;text-align:center;line-height:1.8;}
.ms-btn.admin{border-color:var(--gold);color:var(--gold);}
.ms-btn.admin:hover{background:rgba(201,168,76,.08);}
.ms-btn.disp{border-color:#4a3a5a;color:#7a6a8a;}
.ms-btn.disp:hover{background:rgba(74,58,90,.1);}

/* ADMIN */
#admWrap{background:var(--bg2);border-bottom:1px solid var(--border);position:relative;z-index:20;}
.adm-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:.7rem 1.2rem;}
.adm-lbl{font-size:11px;color:var(--gold-dim);letter-spacing:3px;font-family:'Playfair Display',serif;}
.ubtn{padding:5px 12px;border:1px solid var(--pm);background:var(--pd);color:var(--gold);font-size:11px;cursor:pointer;border-radius:3px;font-family:'Cormorant Garamond',serif;transition:background .2s;}
.ubtn:hover{background:#211530;}
.chips{display:flex;gap:5px;}
.chip{font-size:10px;color:var(--gold-dim);background:var(--pd);border:1px solid var(--border);padding:2px 8px;border-radius:20px;}
.chip b{color:var(--gold);}
.sdot{width:7px;height:7px;border-radius:50%;background:#555;display:inline-block;margin-right:5px;transition:background .4s;}
.sdot.ok{background:#4caf82;}.sdot.err{background:#c04c4c;}.sdot.wait{background:#c0a030;}
.stxt{font-size:10px;color:#6a5a7a;}
.strip{display:flex;gap:5px;flex-wrap:wrap;padding:.4rem 1.2rem .7rem;max-height:90px;overflow-y:auto;}
.thumb{width:40px;height:40px;border-radius:50%;overflow:hidden;border:1.5px solid var(--pm);position:relative;flex-shrink:0;}
.thumb.drawn{opacity:.15;filter:grayscale(1);}
.thumb img,.tav{width:100%;height:100%;object-fit:cover;}
.tav{display:flex;align-items:center;justify-content:center;font-size:14px;}
.tdel{position:absolute;top:-2px;right:-2px;width:13px;height:13px;border-radius:50%;background:#120810;color:#b05060;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid #3a1a2a;}

/* PRIZE ADMIN */
#prizeAdm{background:var(--bg3);border-bottom:1px solid #1a1820;padding:.7rem 1.2rem;position:relative;z-index:20;}
.pa-t{font-size:10px;letter-spacing:3px;color:var(--gold-dim);margin-bottom:7px;font-family:'Playfair Display',serif;}
.prize-list{display:flex;flex-direction:column;gap:4px;}
.prize-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:2px 0;}
.prize-row.ar{border-left:2px solid var(--gold);padding-left:6px;}
.par{font-size:12px;color:var(--gold-dim);cursor:pointer;width:16px;flex-shrink:0;}
.par:hover,.prize-row.ar .par{color:var(--gold);}
.pi{background:var(--pd);border:1px solid var(--border);color:var(--gold-light);font-size:11px;padding:3px 7px;border-radius:3px;font-family:'Cormorant Garamond',serif;}
.pi:focus{outline:none;border-color:#5a4a6a;}
.pi-n{width:120px;}.pi-a{width:95px;}.pi-q{width:45px;text-align:center;}
.pw{font-size:10px;color:#4a3a5a;}.pd2{font-size:11px;color:#4a2a3a;cursor:pointer;}.pd2:hover{color:#c05060;}
.adm-btns{margin-top:7px;display:flex;gap:8px;flex-wrap:wrap;}

/* STAGE BG */
#stageBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#starCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.curtL{position:absolute;top:0;left:0;height:100%;width:90px;background:linear-gradient(to right,rgba(40,5,20,.85),transparent);}
.curtR{position:absolute;top:0;right:0;height:100%;width:90px;background:linear-gradient(to left,rgba(40,5,20,.85),transparent);}
.floorLine{position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(to right,transparent,rgba(201,168,76,.25),transparent);}
.spot{position:absolute;top:-40px;width:220px;height:700px;transform-origin:top center;opacity:0;transition:opacity 1.8s ease;pointer-events:none;}
.spot.sl{left:6%;transform:rotate(-18deg);}
.spot.sr{right:6%;transform:rotate(18deg);}
.spot.on{opacity:1;}
.spotBeam{width:100%;height:100%;background:linear-gradient(to bottom,rgba(255,235,130,.12) 0%,rgba(255,220,100,.05) 50%,transparent 100%);}
.spotSrc{width:14px;height:14px;border-radius:50%;background:rgba(255,245,170,.65);position:absolute;top:0;left:50%;transform:translateX(-50%);}

/* STAGE — ADMIN MODE */
#stage{position:relative;z-index:5;padding:1.5rem 1rem;display:flex;flex-direction:column;align-items:center;min-height:480px;}

/* DISPLAY STAGE — larger everything */
body.display-mode #stage{padding:3rem 2rem;min-height:100vh;justify-content:center;}

.filmStrip{display:flex;align-items:center;gap:8px;margin-bottom:1rem;opacity:.28;width:100%;max-width:540px;}
.fhs{display:flex;gap:4px;}.fh{width:9px;height:9px;background:var(--bg);border:1px solid #3a2e4a;border-radius:2px;}
.fln{flex:1;height:1px;background:#2a2030;}

.preTitle{font-size:10px;letter-spacing:8px;color:#5a4a3a;margin-bottom:4px;text-align:center;font-family:'Playfair Display',serif;}
.mainTitle{font-family:'Playfair Display',serif;letter-spacing:6px;color:var(--gold);text-align:center;font-weight:400;margin-bottom:4px;opacity:0;transform:translateY(10px);transition:opacity 1s,transform 1s;font-size:24px;}
.mainTitle.show{opacity:1;transform:translateY(0);}
.subTitle{letter-spacing:9px;color:#4a3a2a;text-align:center;margin-bottom:1.5rem;font-family:'Playfair Display',serif;font-size:11px;}

body.display-mode .preTitle{font-size:14px;letter-spacing:10px;margin-bottom:8px;}
body.display-mode .mainTitle{font-size:42px;letter-spacing:8px;margin-bottom:8px;}
body.display-mode .subTitle{font-size:15px;letter-spacing:12px;margin-bottom:2.5rem;}

#cbox{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;position:relative;}
body.display-mode #cbox{min-height:480px;}

.idleTxt{color:#2a2035;letter-spacing:5px;font-family:'Playfair Display',serif;font-size:14px;}
body.display-mode .idleTxt{font-size:20px;letter-spacing:8px;}

/* rings */
.ring1{border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative;}
.rp{border-radius:50%;overflow:hidden;}
.rp img,.rpAv{width:100%;height:100%;object-fit:cover;display:block;}
.rpAv{display:flex;align-items:center;justify-content:center;}

/* spin text */
.spinName{font-family:'Playfair Display',serif;letter-spacing:5px;color:var(--gold-light);margin-top:.9rem;text-align:center;font-size:20px;}
.spinSub{letter-spacing:6px;color:var(--gold);margin-top:5px;text-align:center;font-family:'Playfair Display',serif;font-size:10px;}
body.display-mode .spinName{font-size:34px;letter-spacing:7px;margin-top:1.5rem;}
body.display-mode .spinSub{font-size:14px;letter-spacing:8px;margin-top:8px;}

/* winner text */
.wName{font-family:'Playfair Display',serif;letter-spacing:7px;color:#f0e8c8;text-align:center;margin-top:.8rem;font-size:26px;}
.wPrize{letter-spacing:8px;color:var(--gold);text-align:center;margin-top:6px;font-family:'Playfair Display',serif;font-size:10px;}
.wAmt{font-family:'Playfair Display',serif;letter-spacing:3px;color:var(--gold);text-align:center;margin-top:6px;font-size:26px;}
body.display-mode .wName{font-size:48px;letter-spacing:10px;margin-top:1.5rem;}
body.display-mode .wPrize{font-size:15px;letter-spacing:10px;margin-top:10px;}
body.display-mode .wAmt{font-size:44px;letter-spacing:5px;margin-top:10px;}

.ca{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:10;}
.cp{position:absolute;opacity:0;}

/* draw button */
.drawArea{width:100%;max-width:400px;margin-top:1.2rem;text-align:center;}
.dbtn{width:100%;padding:13px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;letter-spacing:8px;cursor:pointer;font-family:'Playfair Display',serif;transition:all .25s;}
.dbtn:hover{background:rgba(201,168,76,.08);}
.dbtn:disabled{opacity:.25;cursor:not-allowed;}
.qnote{font-size:10px;color:#4a3a2a;letter-spacing:2px;margin-top:5px;}

.dispBadge{text-align:center;padding:.6rem;font-size:10px;letter-spacing:4px;color:#2a1a3a;font-family:'Playfair Display',serif;}

/* history */
#hpanel{position:relative;z-index:5;border-top:1px solid #16121e;padding:.8rem 1.4rem 1.5rem;}
.hhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hlbl{font-size:10px;letter-spacing:5px;color:#3a2a3a;font-family:'Playfair Display',serif;}
.rbtn{font-size:10px;color:#4a3a4a;background:none;border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;}
.rbtn:hover{color:var(--gold);}
.hlist{display:flex;gap:6px;flex-wrap:wrap;}
.hi{display:flex;align-items:center;gap:5px;background:#12101a;border:1px solid #22202a;border-radius:3px;padding:4px 9px;}
.hth{width:22px;height:22px;border-radius:50%;overflow:hidden;border:1px solid #2a2230;flex-shrink:0;}
.hth img,.htav{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:9px;}
.hn{font-size:11px;color:#a09070;}.hp{font-size:10px;color:#7a6a4a;margin-left:3px;}

/* debug log */
#dbgLog{position:fixed;bottom:8px;right:8px;font-size:10px;color:#3a2a4a;font-family:monospace;z-index:50;text-align:right;pointer-events:none;}
</style>
</head>
<body>

<div id="modeSelect">
  <div class="ms-title">THE IKIDEMY AWARDS NIGHT</div>
  <div class="ms-sub">請選擇模式 · SELECT MODE</div>
  <div class="ms-btns">
    <button class="ms-btn admin" onclick="enterMode('admin')">
      &#9670; 後台管理<br>
      <span style="font-size:10px;opacity:.6;letter-spacing:2px;">上傳照片 · 操作抽獎</span>
    </button>
    <button class="ms-btn disp" onclick="enterMode('display')">
      &#9675; 展示模式<br>
      <span style="font-size:10px;opacity:.6;letter-spacing:2px;">投影給員工</span>
    </button>
  </div>
</div>

<div id="admWrap" style="display:none">
  <div class="adm-bar">
    <span class="adm-lbl">&#9670; BACKSTAGE</span>
    <button class="ubtn" onclick="document.getElementById('fi').click()">上傳照片</button>
    <input type="file" id="fi" accept="image/*" multiple style="display:none">
    <div class="chips">
      <div class="chip">總 <b id="sT">0</b></div>
      <div class="chip">可抽 <b id="sA">0</b></div>
      <div class="chip">已抽 <b id="sD">0</b></div>
    </div>
    <span style="display:flex;align-items:center;margin-left:auto;"><span class="sdot wait" id="sdot"></span><span class="stxt" id="stxt">連線中...</span></span>
  </div>
  <div class="strip" id="strip"></div>
</div>

<div id="prizeAdm" style="display:none">
  <div class="pa-t">&#9670; 獎項設定</div>
  <div class="prize-list" id="prizeList"></div>
  <div class="adm-btns">
    <button class="ubtn" onclick="addPrize()">+ 新增獎項</button>
    <button class="ubtn" style="border-color:var(--gold);" onclick="applyAndSave()">套用 &#9654;</button>
    <button class="ubtn" onclick="savePrizes()" style="border-color:#5a4a6a;color:#8a7a9a;">儲存設定</button>
  </div>
</div>

<div id="stageBg">
  <canvas id="starCanvas"></canvas>
  <div class="spot sl" id="spotL"><div class="spotSrc"></div><div class="spotBeam"></div></div>
  <div class="spot sr" id="spotR"><div class="spotSrc"></div><div class="spotBeam"></div></div>
  <div class="curtL"></div><div class="curtR"></div>
  <div class="floorLine"></div>
</div>

<div id="stage" style="display:none">
  <div class="filmStrip">
    <div class="fhs"><div class="fh"></div><div class="fh"></div><div class="fh"></div></div>
    <div class="fln"></div>
    <div class="fhs"><div class="fh"></div><div class="fh"></div><div class="fh"></div></div>
  </div>
  <div class="preTitle">THE IKIDEMY PRESENTS</div>
  <div class="mainTitle" id="mainTitle">THE IKIDEMY AWARDS NIGHT</div>
  <div class="subTitle">LUCKY DRAW</div>
  <div id="cbox">
    <span class="idleTxt">&#9733; &nbsp; READY &nbsp; &#9733;</span>
    <div class="ca" id="ca"></div>
  </div>
  <div class="drawArea" id="drawArea">
    <button class="dbtn" id="dbtn" onclick="doDraw()">DRAW</button>
    <div class="qnote" id="qnote"></div>
  </div>
  <div class="dispBadge" id="dispBadge" style="display:none">&#9675; DISPLAY MODE</div>
</div>

<div id="hpanel" style="display:none">
  <div class="hhd">
    <span class="hlbl">WINNERS TONIGHT</span>
    <button class="rbtn" id="resetBtn" onclick="doReset()" style="display:none">RESET ALL</button>
  </div>
  <div class="hlist" id="hlist"></div>
</div>

<div id="dbgLog"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,set,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyCZBnFoK6a5w6uDCy6gr_9gLHka6Qc0n1M",
  authDomain:"ikidemy-awards.firebaseapp.com",
  databaseURL:"https://ikidemy-awards-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"ikidemy-awards",
  storageBucket:"ikidemy-awards.firebasestorage.app",
  messagingSenderId:"512160039017",
  appId:"1:512160039017:web:509bef3431346653cde2f8"
};
const fbApp=initializeApp(firebaseConfig);
const db=getDatabase(fbApp);
const lotteryRef=ref(db,'lottery2'); // fresh key to avoid stale data

const BGS=["#1a1028","#0d1a28","#1a100d","#0d1a14","#1a1810","#1a0d1a"];
const CLS=["#b090e0","#60a8d8","#d09060","#60c890","#d0c060","#d060a0"];

let role=null;
let spinIv=null;
let localSaving=false;

// Local state — admin is the single source of truth
let S={
  prizes:[
    {name:"Grand Prize",amt:"NT$30,000",quota:1},
    {name:"First Prize",amt:"NT$20,000",quota:2},
    {name:"Second Prize",amt:"NT$10,000",quota:10},
    {name:"Third Prize",amt:"NT$8,000",quota:10},
    {name:"Fourth Prize",amt:"NT$5,000",quota:10},
    {name:"Fifth Prize",amt:"NT$3,000",quota:21},
  ],
  photos:[],
  drawn:[],
  hist:[],
  ap:0,
  phase:'idle',   // idle | spinning | winner
  winner:null,
  cpname:'',
  cpamt:'',
  seq:0           // increment on every state change so display can detect changes
};

function dbg(msg){
  const el=document.getElementById('dbgLog');
  if(el)el.textContent=new Date().toLocaleTimeString()+' '+msg;
}

function syncStatus(state){
  const dot=document.getElementById('sdot');
  const txt=document.getElementById('stxt');
  if(!dot||!txt)return;
  dot.className='sdot '+(state==='ok'?'ok':state==='err'?'err':'wait');
  txt.textContent=state==='ok'?'已連線':state==='err'?'連線失敗':'連線中...';
}

// Save full state to Firebase
function pushState(){
  localSaving=true;
  const payload=JSON.parse(JSON.stringify(S));
  set(lotteryRef,payload)
    .then(()=>{syncStatus('ok');setTimeout(()=>{localSaving=false;},300);})
    .catch(e=>{syncStatus('err');localSaving=false;dbg('save err:'+e.message);});
}

// Listen
onValue(lotteryRef,snap=>{
  if(localSaving)return;
  const d=snap.val();
  dbg('recv phase='+(d?d.phase:'null')+' seq='+(d?d.seq:'?'));
  syncStatus('ok');
  if(!d)return;

  const prevPhase=S.phase;
  const prevSeq=S.seq||0;
  S=Object.assign({},S,d);

  // Always re-render UI elements
  if(role==='admin'){renderAdmin();}
  renderHist();

  // Display reacts to phase changes
  if(role==='display'){
    if(S.seq!==prevSeq){
      dbg('display: phase='+S.phase);
      if(S.phase==='spinning'){
        showSpinUI();
      } else if(S.phase==='winner'&&S.winner){
        stopSpin();
        showWinnerUI(S.winner,S.cpname,S.cpamt);
        doConfetti();
      } else if(S.phase==='idle'){
        stopSpin();
        document.getElementById('cbox').innerHTML='<span class="idleTxt">&#9733; &nbsp; READY &nbsp; &#9733;</span><div class="ca" id="ca"></div>';
      }
    }
  }
},err=>{syncStatus('err');dbg('listen err:'+err.message);});

/* ── HELPERS ── */
function avail(){return(S.photos||[]).filter(p=>!(S.drawn||[]).includes(p.id));}
function won(i){return(S.hist||[]).filter(h=>h.pi===i).length;}
function mkAv(p,s){
  const f=Math.floor((s||44)*.36);
  return p&&p.src
    ?`<img src="${p.src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
    :`<div class="rpAv" style="width:100%;height:100%;background:${p?p.bg:'#1a1028'};color:${p?p.col:'#b090e0'};font-size:${f}px;font-family:'Playfair Display',serif;">${p?p.name[0]:'?'}</div>`;
}
function mkRing(p,outer,inner,glow){
  return`<div style="position:relative;width:${outer}px;height:${outer}px;display:flex;align-items:center;justify-content:center;">
    <div style="position:absolute;width:${outer}px;height:${outer}px;border-radius:50%;box-shadow:0 0 ${glow}px ${Math.floor(glow/3)}px rgba(201,168,76,.25);"></div>
    <div class="ring1" style="width:${inner}px;height:${inner}px;">
      <div class="rp" style="width:${inner-12}px;height:${inner-12}px;">${mkAv(p,inner-12)}</div>
    </div>
  </div>`;
}

/* ── ENTER MODE ── */
window.enterMode=function(m){
  role=m;
  document.getElementById('modeSelect').style.display='none';
  document.getElementById('stage').style.display='flex';
  document.getElementById('spotL').classList.add('on');
  document.getElementById('spotR').classList.add('on');
  setTimeout(()=>document.getElementById('mainTitle').classList.add('show'),500);
  initStars();

  if(role==='admin'){
    document.body.classList.remove('display-mode');
    document.getElementById('admWrap').style.display='block';
    document.getElementById('prizeAdm').style.display='block';
    document.getElementById('drawArea').style.display='block';
    document.getElementById('dispBadge').style.display='none';
    document.getElementById('resetBtn').style.display='inline';
    renderAdmin();
  } else {
    document.body.classList.add('display-mode');
    document.getElementById('admWrap').style.display='none';
    document.getElementById('prizeAdm').style.display='none';
    document.getElementById('drawArea').style.display='none';
    document.getElementById('dispBadge').style.display='block';
    document.getElementById('resetBtn').style.display='none';
    // Restore current state from Firebase on load
    if(S.phase==='winner'&&S.winner){showWinnerUI(S.winner,S.cpname,S.cpamt);}
    else if(S.phase==='spinning'){showSpinUI();}
  }
};

/* ── ADMIN RENDER ── */
function renderAdmin(){
  renderPrizeList();renderStrip();updateStats();updateNote();
}
function renderPrizeList(){
  if(role!=='admin')return;
  document.getElementById('prizeList').innerHTML=(S.prizes||[]).map((p,i)=>`
    <div class="prize-row${i===S.ap?' ar':''}">
      <span class="par" onclick="selAP(${i})">&#9654;</span>
      <input class="pi pi-n" value="${p.name}" oninput="S.prizes[${i}].name=this.value" placeholder="獎項名稱">
      <input class="pi pi-a" value="${p.amt}" oninput="S.prizes[${i}].amt=this.value" placeholder="金額">
      <span style="font-size:10px;color:#5a4a6a;">人數</span>
      <input class="pi pi-q" type="number" min="1" value="${p.quota}" oninput="S.prizes[${i}].quota=parseInt(this.value)||1">
      <span class="pw">${won(i)}已抽</span>
      ${(S.prizes||[]).length>1?`<span class="pd2" onclick="remPrize(${i})">&#10005;</span>`:''}
    </div>`).join('');
}
window.selAP=i=>{S.ap=i;renderPrizeList();updateNote();};
window.applyAndSave=()=>{
  S.seq=(S.seq||0)+1;
  pushState();
  renderPrizeList();updateNote();
  document.getElementById('cbox').innerHTML=`<span class="idleTxt">&#9733; &nbsp; ${(S.prizes[S.ap]||{name:''}).name.toUpperCase()} &nbsp; &#9733;</span><div class="ca" id="ca"></div>`;
};
window.savePrizes=()=>{S.seq=(S.seq||0)+1;pushState();};
window.addPrize=()=>{(S.prizes=S.prizes||[]).push({name:"New Prize",amt:"NT$0",quota:1});renderPrizeList();};
window.remPrize=i=>{
  if((S.prizes||[]).length<=1)return;
  S.prizes.splice(i,1);
  if(S.ap>=S.prizes.length)S.ap=S.prizes.length-1;
  renderPrizeList();updateNote();
};
function updateNote(){
  if(role!=='admin')return;
  const p=(S.prizes||[])[S.ap];if(!p)return;
  const rem=Math.max(0,p.quota-won(S.ap));
  document.getElementById('qnote').textContent=`${p.name}  ／  剩餘 ${rem} / ${p.quota}`;
  const btn=document.getElementById('dbtn');if(!btn)return;
  btn.disabled=rem<=0||S.phase==='spinning';
  btn.textContent=rem<=0?'COMPLETED':S.phase==='spinning'?'DRAWING...':'DRAW';
}
function renderStrip(){
  if(role!=='admin')return;
  document.getElementById('strip').innerHTML=(S.photos||[]).map(p=>`
    <div class="thumb${(S.drawn||[]).includes(p.id)?' drawn':''}">${mkAv(p,40)}
    ${!(S.drawn||[]).includes(p.id)?`<div class="tdel" onclick="delP(${p.id})">x</div>`:''}</div>`).join('');
}
window.delP=id=>{S.photos=(S.photos||[]).filter(p=>p.id!==id);renderStrip();updateStats();pushState();};
function updateStats(){
  if(role!=='admin')return;
  const a=avail().length;
  const t=document.getElementById('sT'),a2=document.getElementById('sA'),d=document.getElementById('sD');
  if(t)t.textContent=(S.photos||[]).length;
  if(a2)a2.textContent=a;
  if(d)d.textContent=(S.drawn||[]).length;
}

/* ── SPIN UI ── */
function showSpinUI(){
  const all=S.photos||[];
  if(!all.length)return;
  const isDisp=role==='display';
  const outer=isDisp?260:190;
  const inner=isDisp?220:160;
  const glow=isDisp?80:50;
  const box=document.getElementById('cbox');
  const first=all[Math.floor(Math.random()*all.length)];
  box.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;">
      ${mkRing(first,outer,inner,glow)}
      <div class="spinName" id="sn0">&#8212;</div>
      <div class="spinSub">${S.cpname}&nbsp;&#183;&nbsp;${S.cpamt}</div>
    </div>
    <div class="ca" id="ca"></div>`;
  stopSpin();
  spinIv=setInterval(()=>{
    const r=all[Math.floor(Math.random()*all.length)];
    const sp=box.querySelector('.rp');
    const sn=document.getElementById('sn0');
    if(sp)sp.innerHTML=mkAv(r,inner-12);
    if(sn)sn.textContent=r.name;
  },85);
}

function stopSpin(){if(spinIv){clearInterval(spinIv);spinIv=null;}}

function showWinnerUI(w,pname,pamt){
  stopSpin();
  const isDisp=role==='display';
  const outer=isDisp?320:220;
  const inner=isDisp?270:180;
  const glow=isDisp?100:70;
  const box=document.getElementById('cbox');
  box.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="position:relative;width:${outer}px;height:${outer}px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;width:${outer}px;height:${outer}px;border-radius:50%;box-shadow:0 0 ${glow}px ${Math.floor(glow/4)}px rgba(201,168,76,.3);"></div>
        <div class="ring1" style="width:${inner}px;height:${inner}px;">
          <div style="position:absolute;width:${inner+16}px;height:${inner+16}px;border-radius:50%;border:1px solid #6a5a3a;top:-8px;left:-8px;"></div>
          <div style="position:absolute;width:${inner+30}px;height:${inner+30}px;border-radius:50%;border:1px solid #2a2018;top:-15px;left:-15px;"></div>
          <div class="rp" style="width:${inner-12}px;height:${inner-12}px;">${mkAv(w,inner-12)}</div>
        </div>
      </div>
      <div class="wName">${w.name}</div>
      <div class="wPrize">${pname}</div>
      <div class="wAmt">${pamt}</div>
    </div>
    <div class="ca" id="ca"></div>`;
}

/* ── DRAW (admin only) ── */
window.doDraw=function(){
  if(role!=='admin')return;
  const av2=avail();if(!av2.length||S.phase==='spinning')return;
  const p=(S.prizes||[])[S.ap];if(!p)return;
  const rem=p.quota-won(S.ap);if(rem<=0)return;

  // Pick winner immediately
  const winner=av2[Math.floor(Math.random()*av2.length)];

  // Push spinning state
  S.phase='spinning';
  S.cpname=p.name;
  S.cpamt=p.amt;
  S.winner=null;
  S.seq=(S.seq||0)+1;
  pushState();
  dbg('pushed spinning seq='+S.seq);

  // Show local spin
  showSpinUI();
  document.getElementById('dbtn').disabled=true;
  document.getElementById('dbtn').textContent='DRAWING...';

  setTimeout(()=>{
    stopSpin();
    S.drawn=(S.drawn||[]).concat(winner.id);
    S.hist=(S.hist||[]).concat({...winner,pi:S.ap,pname:p.name,pamount:p.amt});
    S.winner=winner;
    S.phase='winner';
    S.seq=(S.seq||0)+1;
    pushState();
    dbg('pushed winner seq='+S.seq);

    showWinnerUI(winner,p.name,p.amt);
    doConfetti();
    renderAdmin();
    const rem2=p.quota-won(S.ap);
    document.getElementById('dbtn').disabled=rem2<=0;
    document.getElementById('dbtn').textContent=rem2>0?'DRAW AGAIN':'COMPLETED';
  },2800);
};

/* ── CONFETTI ── */
function doConfetti(){
  const box=document.getElementById('ca');if(!box)return;
  const cols=['#c9a84c','#f0e0a0','#e8c870','#fff8d0','#d4a830','#b8921e'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='cp';
    const c=cols[Math.floor(Math.random()*cols.length)];
    const x=Math.random()*100,rot=Math.random()*360,w=3+Math.random()*10,h=3+Math.random()*10;
    el.style.cssText=`left:${x}%;top:28%;width:${w}px;height:${h}px;background:${c};transform:rotate(${rot}deg);border-radius:${Math.random()>.5?'50%':'2px'};position:absolute;opacity:0;`;
    box.appendChild(el);
    el.animate([
      {opacity:1,transform:`translate(0,0) rotate(${rot}deg)`},
      {opacity:0,transform:`translate(${(Math.random()-.5)*320}px,${-(150+Math.random()*280)}px) rotate(${rot+720}deg)`}
    ],{duration:1400+Math.random()*1000,easing:'cubic-bezier(.1,.9,.3,1)',fill:'forwards'});
  }
}

/* ── HISTORY ── */
function renderHist(){
  const hist=S.hist||[];
  if(!hist.length){document.getElementById('hpanel').style.display='none';return;}
  document.getElementById('hpanel').style.display='block';
  document.getElementById('hlist').innerHTML=[...hist].reverse().map(h=>`
    <div class="hi">
      <div class="hth">${h.src?`<img src="${h.src}">`:`<div class="htav" style="background:${h.bg||'#1a1028'};color:${h.col||'#b090e0'};">${h.name[0]}</div>`}</div>
      <span class="hn">${h.name}</span><span class="hp">${h.pname}</span>
    </div>`).join('');
}

/* ── RESET ── */
window.doReset=function(){
  if(role!=='admin')return;
  if(!confirm('確定重置所有抽獎紀錄？'))return;
  S.drawn=[];S.hist=[];S.winner=null;S.phase='idle';S.seq=(S.seq||0)+1;
  pushState();
  document.getElementById('cbox').innerHTML='<span class="idleTxt">&#9733; &nbsp; READY &nbsp; &#9733;</span><div class="ca" id="ca"></div>';
  document.getElementById('dbtn').textContent='DRAW';
  document.getElementById('dbtn').disabled=false;
  renderAdmin();renderHist();
};

/* ── FILE UPLOAD ── */
document.getElementById('fi').addEventListener('change',function(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      (S.photos=S.photos||[]).push({
        id:Date.now()+Math.random(),
        name:f.name.replace(/\.[^.]+$/,''),
        src:ev.target.result,
        bg:BGS[S.photos.length%6],
        col:CLS[S.photos.length%6]
      });
      renderStrip();updateStats();pushState();
    };r.readAsDataURL(f);
  });this.value='';
});

/* ── STARS ── */
function initStars(){
  const c=document.getElementById('starCanvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  for(let i=0;i<130;i++){
    const x=Math.random()*c.width,y=Math.random()*c.height,rr=Math.random()*.9+.15,a=Math.random()*.65+.1;
    ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,240,180,${a})`;ctx.fill();
  }
}
window.addEventListener('resize',initStars);
initStars();
</script>
</body>
</html>
